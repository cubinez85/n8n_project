# =============================================================================
# n8n → прокси на Docker-контейнер (порт 5678)
# Доступ по http://<IP> без порта
# =============================================================================

server {
    listen 80;
    server_name n8n.cubinez.ru;  # Или укажите ваш домен / IP

    # Логи
    access_log /var/log/nginx/n8n-access.log;
    error_log /var/log/nginx/n8n-error.log;

    # Максимальный размер тела запроса (для загрузки файлов в n8n)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:5678;

        # Заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # WebSocket (обязательно для n8n!)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты для долгих воркфлоу
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    # Опционально: кэширование статики
    location ~* ^/static/ {
        proxy_pass http://127.0.0.1:5678;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
